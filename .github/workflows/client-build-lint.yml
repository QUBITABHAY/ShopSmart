name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      client_changed: ${{ steps.changes.outputs.client_changed }}
      server_changed: ${{ steps.changes.outputs.server_changed }}
      docker_changed: ${{ steps.changes.outputs.docker_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect module changes
        id: changes
        run: ./scripts/ci/changed-modules.sh

  client-ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.client_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "client/package-lock.json"

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run lint
        working-directory: client
        run: npm run lint

      - name: Run tests
        working-directory: client
        run: npm run test -- --run

      - name: Run build
        working-directory: client
        run: npm run build

  server-ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.server_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run lint
        working-directory: server
        run: npm run lint

      - name: Run tests
        working-directory: server
        run: npm run test
