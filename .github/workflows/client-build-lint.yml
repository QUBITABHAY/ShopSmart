name: Client Build and Lint

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - ".github/workflows/client-build-lint.yml"
  pull_request:
    branches:
      - main
    paths:
      - "client/**"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "client/package-lock.json"

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run lint
        working-directory: client
        run: npm run lint

      - name: Run build
        working-directory: client
        run: npm run build
