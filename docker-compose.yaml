services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: shopsmart
      POSTGRES_USER: shopsmart
      POSTGRES_PASSWORD: shopsmart
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsmart"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
